function SigPad({onSave,existing}){
  const ref=useRef(null);const[drawing,setDrawing]=useState(false);const[has,setHas]=useState(!!existing);
  useEffect(()=>{if(existing&&ref.current){const img=new Image();img.onload=()=>ref.current.getContext("2d").drawImage(img,0,0);img.src=existing;}},[]);
  const pos=e=>{const r=ref.current.getBoundingClientRect();return e.touches?{x:e.touches[0].clientX-r.left,y:e.touches[0].clientY-r.top}:{x:e.clientX-r.left,y:e.clientY-r.top};};
  const dn=e=>{e.preventDefault();setDrawing(true);const p=pos(e),ctx=ref.current.getContext("2d");ctx.beginPath();ctx.moveTo(p.x,p.y);};
  const mv=e=>{e.preventDefault();if(!drawing)return;const p=pos(e),ctx=ref.current.getContext("2d");ctx.lineWidth=2;ctx.lineCap="round";ctx.strokeStyle="#1a1a5e";ctx.lineTo(p.x,p.y);ctx.stroke();setHas(true);};
  const up=()=>{setDrawing(false);if(ref.current)onSave(ref.current.toDataURL());};
  const clr=()=>{ref.current.getContext("2d").clearRect(0,0,SIG_W,SIG_H);setHas(false);onSave(null);};
  return <div style={{display:"flex",flexDirection:"column",gap:6}}>
    <canvas ref={ref} width={SIG_W} height={SIG_H} style={{border:"1.5px solid #99b",borderRadius:4,background:"#f9f9ff",cursor:"crosshair",touchAction:"none"}}
      onMouseDown={dn} onMouseMove={mv} onMouseUp={up} onMouseLeave={up} onTouchStart={dn} onTouchMove={mv} onTouchEnd={up}/>
    <div style={{display:"flex",gap:8,alignItems:"center"}}>
      <button onClick={clr} style={{fontSize:11,padding:"2px 10px",background:"#eee",border:"1px solid #ccc",borderRadius:3,cursor:"pointer"}}>Effacer</button>
      {has&&<span style={{fontSize:11,color:"#2a7a2a"}}>✓ Enregistrée</span>}
    </div>
  </div>;
}

function XCell({active,done,onToggle}){
  if(!active)return <td style={{textAlign:"center",borderBottom:"1px solid #eee",color:"#ddd",padding:"4px 6px"}}>—</td>;
  return <td onClick={onToggle} title="Cliquer pour valider"
    style={{textAlign:"center",borderBottom:"1px solid #eee",cursor:"pointer",userSelect:"none",fontSize:15,fontWeight:"bold",padding:"4px 6px",
      color:done?"#1e7a1e":"#2244aa",opacity:done?1:0.35}}>{done?"✓":"×"}</td>;
}

function Field({label,val,onChange,w,unit,ph}){
  return <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:5}}>
    <span style={{fontSize:12,color:"#444",minWidth:w||160,flexShrink:0}}>{label}</span>
    <input value={val} onChange={e=>onChange(e.target.value)} placeholder={ph||""} style={{width:80,padding:"2px 6px",border:"1px solid #b0b8e0",borderRadius:3,fontSize:12,textAlign:"center"}}/>
    {unit&&<span style={{fontSize:11,color:"#888"}}>{unit}</span>}
  </div>;
}

  const expJ=()=>{const b=new Blob([JSON.stringify({st,at:new Date().toISOString()},null,2)],{type:"application/json"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=`DH251_${immat}_${visitDate}.json`;a.click();URL.revokeObjectURL(u);};
  const impJ=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const p=JSON.parse(ev.target.result);if(p.st){setSt(p.st);setSaveMsg("loaded");setTimeout(()=>setSaveMsg(null),2500);}}catch{alert("Fichier invalide.");}};r.readAsText(f);e.target.value="";};

  const togCk=k=>upd("checked")(p=>({...p,[k]:!p[k]}));

            const rh=Math.max(5,(Math.max(elL.length,inL.length))*3.6+2+(ntL.length?ntL.length*3+1:0));
            chk(rh+1);
            if(rd)doc.setFillColor(239,255,239);else doc.setFillColor(i%2?247:255,i%2?247:255,i%2?253:255);
            doc.rect(ML,y,CW,rh,"F");doc.setDrawColor(216,220,240);doc.line(ML,y+rh,ML+CW,y+rh);
            [ML+38,ML+132,ML+142,ML+154].forEach(x=>doc.line(x,y,x,y+rh));
            doc.setFontSize(7);doc.setFont("helvetica","bold");doc.setTextColor(26,26,94);
            elL.forEach((l,li)=>doc.text(l,ML+1,y+3.6+li*3.6));
            doc.setFont("helvetica","normal");doc.setTextColor(40,40,40);
            inL.forEach((l,li)=>doc.text(l,ML+39,y+3.6+li*3.6));
            if(it.v50){doc.setFontSize(8);doc.setFont("helvetica","bold");doc.setTextColor(d50?30:34,d50?122:68,d50?30:170);doc.text(d50?"✓":"x",ML+134,y+rh/2+1.5);}
            if(it.v100){doc.setFontSize(8);doc.setFont("helvetica","bold");doc.setTextColor(d100?30:34,d100?122:68,d100?30:170);doc.text(d100?"✓":"x",ML+144,y+rh/2+1.5);}
            if(ntL.length){doc.setFontSize(6.5);doc.setFont("helvetica","italic");doc.setTextColor(150,100,0);ntL.forEach((l,li)=>doc.text(l,ML+155,y+3.2+li*3));}
            doc.setTextColor(0,0,0);y+=rh;
          }
        }
        y+=3;
      }
      // Point fixe
      chk(50);doc.setFillColor(26,26,94);doc.rect(ML,y,CW,6,"F");
      doc.setTextColor(255,255,255);doc.setFontSize(8.5);doc.setFont("helvetica","bold");
      doc.text("RAPPORT DE POINT FIXE",ML+2,y+4.2);doc.setTextColor(0,0,0);y+=8;
      const pfData=[
        ["Horamètre entrée / sortie",`${pf.horametre_entree||"—"} / ${pf.horametre_sortie||"—"}`],
        ["Pression huile / Température huile",`${pf.p_huile||"—"} / ${pf.t_huile||"—"}`],
        ["Température culasse",pf.t_culasse],
        ["Pression essence avec / sans pompe",`${pf.p_ess_avec||"—"} / ${pf.p_ess_sans||"—"}`],
        ["Régime plein gaz",pf.regime_plein_gaz+" tr/mn"],
        ["RPM max / RPM ralenti",`${pf.rpm_max||"—"} / ${pf.rpm_ralenti||"—"} tr/mn`],
        ["Magnétos — 1G / 1D / 2G / 2D",`${pf.mag_1G||"—"} / ${pf.mag_1D||"—"} / ${pf.mag_2G||"—"} / ${pf.mag_2D||"—"}`],
        ["Réchauffage carbu / cabine",`${pf.rechauffe_carbu||"—"} / ${pf.rechauffe_cabine||"—"}`],
        ["Éclairage cabine / tableau",`${pf.eclairage_cabine||"—"} / ${pf.eclairage_tableau||"—"}`],
        ["Volets / Indicateur tab",`${pf.volets||"—"} / ${pf.indicateur_tab||"—"}`],
        ["Altimètre QFE",pf.altimetre],["Indicateur de virage",pf.indicateur_virage],
        ["Compressions C1/C2/C3/C4",`${pf.comp1||"—"} / ${pf.comp2||"—"} / ${pf.comp3||"—"} / ${pf.comp4||"—"} PSI`],
        ["Freins / Montres",`${pf.freins||"—"} / ${pf.montres||"—"}`],
      ];
      pfData.forEach(([k,v])=>{
        chk(5);doc.setFont("helvetica","bold");doc.setFontSize(7.5);doc.setTextColor(26,26,94);
        doc.text(k+" :",ML+2,y+3.5);doc.setFont("helvetica","normal");doc.setTextColor(0,0,0);
        doc.text(v||"—",ML+90,y+3.5);y+=5;
      });
      y+=4;
      // Vol de contrôle
      chk(50);doc.setFillColor(26,26,94);doc.rect(ML,y,CW,6,"F");
      doc.setTextColor(255,255,255);doc.setFontSize(8.5);doc.setFont("helvetica","bold");
      doc.text("VOL DE CONTRÔLE",ML+2,y+4.2);doc.setTextColor(0,0,0);y+=8;
      const vfData=[
        ["Date / Aérodrome",`${vf.date||"—"} — ${vf.aerodrome||"—"}`],
        ["Pilote",vf.pilote],["Durée vol / QFE / T° sol / Zp sol",`${vf.duree||"—"} / ${vf.qfe||"—"} / ${vf.t_sol||"—"}°C / ${vf.zp_sol||"—"} ft`],
        ["Décollage — tr/mn",vf.rpm_decollage],
        ["Montée alt.1 — Vi/tr/mn/P.ess/P.huil/T°huil",`${vf.vi1||"—"} / ${vf.rpm1||"—"} / ${vf.pess1||"—"} / ${vf.phuil1||"—"} / ${vf.thuil1||"—"}`],
        ["Montée alt.2 — Vi/tr/mn/P.ess/P.huil/T°huil",`${vf.vi2||"—"} / ${vf.rpm2||"—"} / ${vf.pess2||"—"} / ${vf.phuil2||"—"} / ${vf.thuil2||"—"}`],
        ["Palier croisière — Vi/tr/mn/P.ess/P.huil/T°huil",`${vf.pal_vi||"—"} / ${vf.pal_rpm||"—"} / ${vf.pal_pess||"—"} / ${vf.pal_phuil||"—"} / ${vf.pal_thuil||"—"}`],
        ["Maniabilité",vf.maniabilite],["Instruments de bord",vf.instruments],
        ["Climatisation / Réchauffe carbu",`${vf.climatisation||"—"} / ${vf.rech_carbu||"—"}`],
        ["Décrochage avion lisse",`${vf.decroch_lisse_vi||"—"} kt — ${vf.decroch_lisse_obs||"—"}`],
        ["Décrochage décollage",`${vf.decroch_decol_vi||"—"} kt — ${vf.decroch_decol_obs||"—"}`],
        ["Décrochage atterrissage",`${vf.decroch_atterr_vi||"—"} kt — ${vf.decroch_atterr_obs||"—"}`],
        ["Avertisseur décrochage",vf.avertisseur_decrochage],
        ["Piqué à VNE",vf.pique_vne],
        ["Train sortie normale / secours",`${vf.train_normale||"—"} / ${vf.train_secours||"—"}`],
        ["Correcteur d'altitude / Étouffoir",`${vf.correct_alti||"—"} / ${vf.etouffoir||"—"}`],
        ["Remarques pilote",vf.remarques],
      ];
      vfData.forEach(([k,v])=>{
        chk(5);doc.setFont("helvetica","bold");doc.setFontSize(7.5);doc.setTextColor(26,26,94);
        doc.text(k+" :",ML+2,y+3.5);doc.setFont("helvetica","normal");doc.setTextColor(0,0,0);
        const ls=sp(v||"—",CW-92,7.5);ls.forEach((l,li)=>{chk(4);doc.text(l,ML+92,y+3.5+li*3.8);});
        y+=Math.max(5,ls.length*3.8+1);
      });
      y+=4;
      // Test transpondeur
      chk(30);doc.setFillColor(26,26,94);doc.rect(ML,y,CW,6,"F");
      doc.setTextColor(255,255,255);doc.setFontSize(8.5);doc.setFont("helvetica","bold");
      doc.text("ANNEXE 1 — TEST INTERMÉDIAIRE TRANSPONDEUR",ML+2,y+4.2);doc.setTextColor(0,0,0);y+=8;
      [["1200 ft",vf.transp_1200],["3700 ft",vf.transp_3700],["5500 ft",vf.transp_5500],["7500 ft",vf.transp_7500]].forEach(([alt,val])=>{
        chk(5);doc.setFont("helvetica","bold");doc.setFontSize(7.5);doc.setTextColor(26,26,94);
        doc.text("Altitude à relever : "+alt+" — Constatée :",ML+2,y+3.5);
        doc.setFont("helvetica","normal");doc.setTextColor(0,0,0);doc.text(val||"—",ML+95,y+3.5);y+=5;
      });
      doc.setFont("helvetica","normal");doc.setFontSize(7.5);
      doc.text("Pilote : "+(vf.transp_pilote||"—"),ML+2,y+5);
      doc.text("APRSeur : "+(vf.transp_aprs||"—"),ML+80,y+5);y+=10;
      // Travaux & cloture
      chk(30);doc.setFillColor(34,68,170);doc.rect(ML,y,CW,6,"F");
      doc.setTextColor(255,255,255);doc.setFontSize(8.5);doc.setFont("helvetica","bold");
      doc.text("TRAVAUX SUPPLÉMENTAIRES & PIÈCES REMPLACÉES",ML+2,y+4.2);doc.setTextColor(0,0,0);y+=8;
      for(const[lbl,val] of [["Travaux supplémentaires",worksExtra],["Pièces remplacées",partsReplaced]]){
        chk(10);doc.setFillColor(244,244,251);doc.rect(ML,y,CW,5,"F");
        doc.setFont("helvetica","bold");doc.setFontSize(7.5);doc.setTextColor(26,26,94);doc.text(lbl+" :",ML+2,y+3.5);doc.setTextColor(0,0,0);y+=6;
        const ls=sp(val||"Néant",CW-4,7.5);doc.setFont("helvetica","normal");
        ls.forEach((l,li)=>{chk(4);doc.text(l,ML+2,y+3+li*3.8);});y+=ls.length*3.8+4;
      }
      // Déclaration d'entretien APRS
      chk(25);doc.setFillColor(26,26,94);doc.rect(ML,y,CW,6,"F");
      doc.setTextColor(255,255,255);doc.setFontSize(8.5);doc.setFont("helvetica","bold");
      doc.text("DÉCLARATION D'ENTRETIEN — APRS",ML+2,y+4.2);doc.setTextColor(0,0,0);y+=8;
      const aprs=`Je soussigné(e) ${techName||"_______________"}, N° licence ${licenceNum||"_________"}, certifie que l'aéronef ${immat} immatriculé F-${immat} a été entretenu conformément au programme d'entretien CNRA Éd.${INFO.edition} et satisfait aux conditions normales d'utilisation. Fait à Chavenay le ${fmtD(visitDate)}.`;
      doc.setFillColor(244,244,251);doc.rect(ML,y,CW,3,"F");
      const al=sp(aprs,CW-4,7.5);doc.setFont("helvetica","italic");
      al.forEach((l,li)=>{chk(4);doc.text(l,ML+2,y+4+li*4);});y+=al.length*4+6;
      // Signature
      chk(35);doc.setFillColor(34,68,170);doc.rect(ML,y,CW,6,"F");
      doc.setTextColor(255,255,255);doc.setFontSize(8.5);doc.setFont("helvetica","bold");
      doc.text("SIGNATURE",ML+2,y+4.2);doc.setTextColor(0,0,0);y+=8;
      [["Technicien",techName||"—"],["N° Licence",licenceNum||"—"],["Date",fmtD(visitDate)],["Visite",visitType],["Immatriculation",immat]].forEach(([k,v],i)=>{
        doc.setFont("helvetica","bold");doc.setFontSize(8);doc.text(k+" :",ML+2,y+i*5);
        doc.setFont("helvetica","normal");doc.text(v,ML+36,y+i*5);
      });
      const sx=ML+CW-65,sy=y-2;doc.setDrawColor(150,150,200);doc.rect(sx,sy,62,28);
      doc.setFontSize(6.5);doc.setTextColor(160,160,190);doc.text("Signature",sx+2,sy+3.5);
      if(sig)doc.addImage(sig,"PNG",sx+1,sy+5,60,22);
      // Footer
      const np=doc.getNumberOfPages();
      for(let p=1;p<=np;p++){
        doc.setPage(p);doc.setDrawColor(176,184,224);doc.line(ML,PH-10,PW-MR,PH-10);
        doc.setFontSize(6.5);doc.setFont("helvetica","normal");doc.setTextColor(130,130,160);
        doc.text(`DH 251 — ${immat} — Visite ${visitType} du ${fmtD(visitDate)} — Éd.${INFO.edition}`,ML,PH-6.5);
        doc.text(`Page ${p}/${np}`,PW-MR,PH-6.5,{align:"right"});
      }
      doc.save(`DH251_${immat}_${visitType}_${visitDate}.pdf`);
    }catch(e){alert("Erreur PDF : "+e.message);}
    finally{setPdfBusy(false);}
  };

  const SaveBar=()=>(
    <div style={{background:"#0f0f2e",padding:"7px 14px",display:"flex",flexWrap:"wrap",gap:8,alignItems:"center"}}>
      <span style={{fontSize:11,color:"#aab"}}>💾</span>
      <button onClick={save} style={{fontSize:11,padding:"3px 10px",background:"#2244aa",color:"#fff",border:"none",borderRadius:3,cursor:"pointer",fontWeight:"bold"}}>Sauvegarder</button>
      {hasSave&&<button onClick={load} style={{fontSize:11,padding:"3px 10px",background:"#2a7a2a",color:"#fff",border:"none",borderRadius:3,cursor:"pointer"}}>Reprendre</button>}
      <button onClick={expJ} style={{fontSize:11,padding:"3px 10px",background:"#444",color:"#fff",border:"none",borderRadius:3,cursor:"pointer"}}>↓ Export .json</button>
      <label style={{fontSize:11,padding:"3px 10px",background:"#444",color:"#fff",borderRadius:3,cursor:"pointer"}}>↑ Import .json<input type="file" accept=".json" onChange={impJ} style={{display:"none"}}/></label>
      {hasSave&&<button onClick={clear} style={{fontSize:11,padding:"3px 10px",background:"#933",color:"#fff",border:"none",borderRadius:3,cursor:"pointer"}}>Effacer</button>}
      {savedAt&&<span style={{fontSize:10,color:"#8ab"}}>Sauvegarde : {savedAt}</span>}
      {saveMsg&&<span style={{fontSize:11,fontWeight:"bold",color:saveMsg==="cleared"?"#f88":"#8f8"}}>{saveMsg==="saved"?"✓ Sauvegardé !":saveMsg==="loaded"?"✓ Repris !":"✓ Effacé"}</span>}
    </div>
  );

  const tabStyle=(t)=>({padding:"8px 16px",cursor:"pointer",border:"none",borderBottom:tab===t?"3px solid #2244aa":"3px solid transparent",background:tab===t?"#fff":"#eef",fontWeight:tab===t?"bold":"normal",color:tab===t?C.hdr:"#555",fontSize:13});

  return <div style={{fontFamily:"Arial,sans-serif",maxWidth:1000,margin:"0 auto",padding:20,background:C.bg,minHeight:"100vh"}}>
    {/* Header */}
    <div style={{background:C.hdr,color:"#fff",padding:"13px 18px",borderRadius:"8px 8px 0 0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div>
        <div style={{fontSize:18,fontWeight:"bold",letterSpacing:1}}>PROGRAMME D'ENTRETIEN CNRA</div>
        <div style={{fontSize:13,opacity:0.9}}>JODEL DH 251 — {INFO.immat} — {INFO.moteur}</div>
      </div>
      <div style={{textAlign:"right",fontSize:11,opacity:0.85}}>
        <div>Aéroclub ARC — Chavenay 78450</div>
        <div>Éd.{INFO.edition} — RSANav P.E.N. n°042</div>
      </div>
    </div>
    <SaveBar/>

    {/* Infos */}
    <div style={{background:C.lgt,border:`1px solid ${C.brd}`,borderTop:"none",padding:"10px 14px",display:"flex",flexWrap:"wrap",gap:12,alignItems:"flex-end"}}>
      {[{lb:"Immatriculation",val:immat,set:upd("immat"),ph:INFO.immat,w:110},
        {lb:"Date de visite",val:visitDate,set:upd("visitDate"),tp:"date",w:150},
        {lb:"Technicien",val:techName,set:upd("techName"),ph:"Nom Prénom",w:160},
        {lb:"N° Licence",val:licenceNum,set:upd("licenceNum"),ph:"ex: PPL-F-12345",w:130},
        {lb:"Potentiel total (h)",val:totalH,set:upd("totalH"),ph:"ex: 500",w:100}].map(f=>(
        <label key={f.lb} style={{display:"flex",flexDirection:"column",gap:2}}>
          <span style={{fontSize:10,color:"#444",fontWeight:"bold",textTransform:"uppercase"}}>{f.lb}</span>
          <input value={f.val} onChange={e=>f.set(e.target.value)} type={f.tp||"text"} placeholder={f.ph}
            style={{width:f.w,padding:"4px 8px",border:`1px solid ${C.brd}`,borderRadius:3,fontSize:13}}/>
        </label>
      ))}
      <label style={{display:"flex",flexDirection:"column",gap:2}}>
        <span style={{fontSize:10,color:"#444",fontWeight:"bold",textTransform:"uppercase"}}>Type de visite</span>
        <select value={visitType} onChange={e=>upd("visitType")(e.target.value)}
          style={{padding:"5px 10px",border:`1px solid ${C.brd}`,borderRadius:3,fontSize:14,fontWeight:"bold",color:C.hdr,background:"#fff"}}>
          <option>50h</option><option>100h</option>
        </select>
      </label>
    </div>

    {/* Progress */}
    <div style={{background:"#fff",border:`1px solid ${C.brd}`,borderTop:"none",padding:"7px 14px",display:"flex",alignItems:"center",gap:12}}>
      <span style={{fontSize:12,color:"#555",whiteSpace:"nowrap"}}>Progression inspection :</span>
      <div style={{flex:1,background:"#dde0f0",borderRadius:8,height:10,overflow:"hidden"}}>
        <div style={{width:`${pct}%`,background:pct===100?C.grn:C.acc,height:"100%",transition:"width 0.3s",borderRadius:8}}/>
      </div>
      <span style={{fontSize:12,fontWeight:"bold",color:pct===100?C.grn:C.acc,whiteSpace:"nowrap"}}>{dn}/{tot} ({pct}%)</span>
    </div>

    {/* Tabs */}
    <div style={{display:"flex",borderBottom:"1px solid #dde",marginTop:10,background:"#eef"}}>
      {[["inspection","📋 Inspection"],["pf","🔧 Point fixe"],["vf","✈️ Vol contrôle"],["transp","📡 Transpondeur"]].map(([t,lbl])=>(
        <button key={t} onClick={()=>setTab(t)} style={tabStyle(t)}>{lbl}</button>
      ))}
    </div>

    {/* TAB: INSPECTION */}
    {tab==="inspection" && SECTIONS.map(sec=>(
      <div key={sec.id} style={{marginTop:10,border:`1px solid ${C.brd}`,borderRadius:6,background:"#fff"}}>
        <div style={{background:C.acc,color:"#fff",padding:"7px 13px",fontWeight:"bold",fontSize:12,letterSpacing:0.5}}>{sec.title}</div>
        {sec.type==="checklist"?(
          <div style={{padding:"3px 0"}}>
            {sec.items.map((it,i)=>{
              const k=`${sec.id}_${i}`,ok=!!checked[k];
              return <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"5px 12px",background:i%2?C.r1:C.r0,borderBottom:"1px solid #eef",flexWrap:"wrap"}}>
                <input type="checkbox" checked={ok} onChange={()=>togCk(k)} style={{width:16,height:16,cursor:"pointer",accentColor:C.acc,flexShrink:0}}/>
                <span style={{flex:1,fontSize:13,color:ok?"#888":"#222",textDecoration:ok?"line-through":"none",minWidth:200}}>{it}</span>
                <button onClick={()=>setRmkFor(rmkFor===k?null:k)} style={{background:remarks[k]?"#ffe0a0":"#eee",border:"1px solid #ccc",borderRadius:3,cursor:"pointer",fontSize:11,padding:"2px 8px"}}>{remarks[k]?"📝":"+ Note"}</button>
                {rmkFor===k&&<textarea value={remarks[k]||""} onChange={e=>upd("remarks")(p=>({...p,[k]:e.target.value}))} placeholder="Observations..." rows={1} style={{fontSize:12,padding:4,border:"1px solid #ccc",borderRadius:3,width:"100%",resize:"vertical",marginTop:4}}/>}
              </div>;
            })}
          </div>
        ):(
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,minWidth:480}}>
              <thead><tr style={{background:"#edf0f8",color:"#444"}}>
                <th style={{padding:"5px 8px",textAlign:"left",width:"22%",borderBottom:`1px solid ${C.brd}`}}>Élément</th>
                <th style={{padding:"5px 8px",textAlign:"left",borderBottom:`1px solid ${C.brd}`}}>Inspection</th>
                <th style={{padding:"5px 4px",textAlign:"center",width:44,borderBottom:`1px solid ${C.brd}`,color:C.acc}}>50h</th>
                <th style={{padding:"5px 4px",textAlign:"center",width:44,borderBottom:`1px solid ${C.brd}`,color:C.acc}}>100h</th>
                <th style={{padding:"5px 6px",textAlign:"center",width:58,borderBottom:`1px solid ${C.brd}`}}>Note</th>
              </tr></thead>
              <tbody>
                {sec.items.map((it,i)=>{
                  const k=`${sec.id}_${i}`,d50=cx(k,"v50"),d100=cx(k,"v100"),rd=rdone(k,it);
                  return <tr key={i} style={{background:rd?"#efffef":i%2?C.r1:C.r0}}>
                    <td style={{padding:"5px 8px",fontWeight:"600",color:C.hdr,borderBottom:"1px solid #eef",verticalAlign:"top",fontSize:11}}>{it.el}</td>
                    <td style={{padding:"5px 8px",color:"#333",lineHeight:1.4,borderBottom:"1px solid #eef",verticalAlign:"top",fontSize:12}}>{it.insp}</td>
                    <XCell active={it.v50} done={d50} onToggle={()=>togCx(k,"v50")}/>
                    <XCell active={it.v100} done={d100} onToggle={()=>togCx(k,"v100")}/>
                    <td style={{textAlign:"center",borderBottom:"1px solid #eef",verticalAlign:"middle",position:"relative"}}>
                      <button onClick={()=>setRmkFor(rmkFor===k?null:k)} style={{background:remarks[k]?"#ffe0a0":"#eee",border:"1px solid #ccc",borderRadius:3,cursor:"pointer",fontSize:10,padding:"2px 6px"}}>{remarks[k]?"📝":"+"}</button>
                      {rmkFor===k&&<div style={{position:"absolute",right:0,zIndex:20,background:"#fff",border:"1px solid #99b",borderRadius:4,padding:8,boxShadow:"0 2px 10px #0003",width:210}}>
                        <textarea value={remarks[k]||""} onChange={e=>upd("remarks")(p=>({...p,[k]:e.target.value}))} placeholder="Observations..." rows={3} style={{fontSize:12,width:"100%",padding:4,border:"1px solid #ccc",borderRadius:3,resize:"vertical",boxSizing:"border-box"}}/>
                        <button onClick={()=>setRmkFor(null)} style={{marginTop:4,fontSize:11,padding:"2px 10px",cursor:"pointer",background:C.acc,color:"#fff",border:"none",borderRadius:3}}>OK</button>
                      </div>}
                    </td>
                  </tr>;
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>
    ))}

    {/* TAB: POINT FIXE */}
    {tab==="pf" && <div style={{marginTop:10,border:`1px solid ${C.brd}`,borderRadius:6,background:"#fff"}}>
      <div style={{background:C.hdr,color:"#fff",padding:"8px 14px",fontWeight:"bold",fontSize:13}}>RAPPORT DE POINT FIXE MOTEUR</div>
      <div style={{padding:16,display:"flex",flexWrap:"wrap",gap:24}}>
        <div>
          <div style={{fontWeight:"bold",color:C.hdr,fontSize:12,marginBottom:8}}>Identification</div>
          <Field label="Horamètre entrée" val={pf.horametre_entree} onChange={updPF("horametre_entree")} unit="h"/>
          <Field label="Horamètre sortie" val={pf.horametre_sortie} onChange={updPF("horametre_sortie")} unit="h"/>
          <Field label="Date entrée" val={pf.date_entree} onChange={updPF("date_entree")}/>
          <Field label="Date sortie" val={pf.date_sortie} onChange={updPF("date_sortie")}/>
        </div>
        <div>
          <div style={{fontWeight:"bold",color:C.hdr,fontSize:12,marginBottom:8}}>Paramètres moteur</div>
          <Field label="Pression huile" val={pf.p_huile} onChange={updPF("p_huile")}/>
          <Field label="Température huile" val={pf.t_huile} onChange={updPF("t_huile")} unit="°C"/>
          <Field label="Température culasse" val={pf.t_culasse} onChange={updPF("t_culasse")} unit="°C"/>
          <Field label="Pression essence avec pompe" val={pf.p_ess_avec} onChange={updPF("p_ess_avec")} w={190}/>
          <Field label="Pression essence sans pompe" val={pf.p_ess_sans} onChange={updPF("p_ess_sans")} w={190}/>
          <Field label="Régime plein gaz" val={pf.regime_plein_gaz} onChange={updPF("regime_plein_gaz")} unit="tr/mn"/>
          <Field label="RPM max" val={pf.rpm_max} onChange={updPF("rpm_max")} unit="tr/mn"/>
          <Field label="RPM ralenti" val={pf.rpm_ralenti} onChange={updPF("rpm_ralenti")} unit="tr/mn"/>
        </div>
        <div>
          <div style={{fontWeight:"bold",color:C.hdr,fontSize:12,marginBottom:8}}>Magnétos</div>
          <Field label="1+2 t/mn — G" val={pf.mag_1G} onChange={updPF("mag_1G")} unit="tr/mn"/>
          <Field label="1+2 t/mn — D" val={pf.mag_1D} onChange={updPF("mag_1D")} unit="tr/mn"/>
          <Field label="1 ou G" val={pf.mag_2G} onChange={updPF("mag_2G")} unit="tr/mn"/>
          <Field label="2 ou D" val={pf.mag_2D} onChange={updPF("mag_2D")} unit="tr/mn"/>
          <div style={{fontWeight:"bold",color:C.hdr,fontSize:12,marginBottom:8,marginTop:8}}>Compressions</div>
          <Field label="Cylindre 1" val={pf.comp1} onChange={updPF("comp1")} unit="PSI"/>
          <Field label="Cylindre 2" val={pf.comp2} onChange={updPF("comp2")} unit="PSI"/>
          <Field label="Cylindre 3" val={pf.comp3} onChange={updPF("comp3")} unit="PSI"/>
          <Field label="Cylindre 4" val={pf.comp4} onChange={updPF("comp4")} unit="PSI"/>
        </div>
        <div>
          <div style={{fontWeight:"bold",color:C.hdr,fontSize:12,marginBottom:8}}>Équipements</div>
          <Field label="Réchauffe carbu" val={pf.rechauffe_carbu} onChange={updPF("rechauffe_carbu")}/>
          <Field label="Réchauffe cabine" val={pf.rechauffe_cabine} onChange={updPF("rechauffe_cabine")}/>
          <Field label="Éclairage cabine" val={pf.eclairage_cabine} onChange={updPF("eclairage_cabine")}/>
          <Field label="Éclairage tableau" val={pf.eclairage_tableau} onChange={updPF("eclairage_tableau")}/>
          <Field label="Volets" val={pf.volets} onChange={updPF("volets")}/>
          <Field label="Indicateur tab" val={pf.indicateur_tab} onChange={updPF("indicateur_tab")}/>
          <Field label="Jauges essence" val={pf.jauges_ess} onChange={updPF("jauges_ess")}/>
          <Field label="Instruments moteur" val={pf.instru_moteur} onChange={updPF("instru_moteur")}/>
          <Field label="Altimètre QFE" val={pf.altimetre} onChange={updPF("altimetre")}/>
          <Field label="Indicateur de virage" val={pf.indicateur_virage} onChange={updPF("indicateur_virage")}/>
          <Field label="Horizon artificiel" val={pf.horizon} onChange={updPF("horizon")}/>
          <Field label="Conservateur de cap" val={pf.conservateur_cap} onChange={updPF("conservateur_cap")}/>
          <Field label="Freins" val={pf.freins} onChange={updPF("freins")}/>
          <Field label="Montres" val={pf.montres} onChange={updPF("montres")}/>
        </div>
      </div>
    </div>}

    {/* TAB: VOL CONTRÔLE */}
    {tab==="vf" && <div style={{marginTop:10,border:`1px solid ${C.brd}`,borderRadius:6,background:"#fff"}}>
      <div style={{background:C.hdr,color:"#fff",padding:"8px 14px",fontWeight:"bold",fontSize:13}}>VOL DE CONTRÔLE — Annexe IV arrêté 24/07/1991</div>
      <div style={{padding:16,display:"flex",flexWrap:"wrap",gap:24}}>
        <div>
          <div style={{fontWeight:"bold",color:C.hdr,fontSize:12,marginBottom:8}}>Identification du vol</div>
          <Field label="Date" val={vf.date} onChange={updVF("date")}/>
          <Field label="Aérodrome" val={vf.aerodrome} onChange={updVF("aerodrome")}/>
          <Field label="Pilote" val={vf.pilote} onChange={updVF("pilote")} w={80}/>
          <Field label="Durée de vol" val={vf.duree} onChange={updVF("duree")} unit="mn"/>
          <Field label="QFE" val={vf.qfe} onChange={updVF("qfe")} unit="hPa"/>
          <Field label="T° sol" val={vf.t_sol} onChange={updVF("t_sol")} unit="°C"/>
          <Field label="Zp sol" val={vf.zp_sol} onChange={updVF("zp_sol")} unit="ft"/>
        </div>
        <div>
          <div style={{fontWeight:"bold",color:C.hdr,fontSize:12,marginBottom:8}}>Point fixe moteur au sol</div>
          <Field label="Régime plein gaz" val={vf.rpm_decollage} onChange={updVF("rpm_decollage")} unit="tr/mn"/>
          <div style={{fontWeight:"bold",color:C.hdr,fontSize:12,marginBottom:8,marginTop:8}}>Montée — Altitude 1</div>
          {[["Altitude 1","alti1","ft"],["Vi 1","vi1","kt"],["tr/mn 1","rpm1","tr/mn"],["P. ess 1","pess1",""],["P. huil 1","phuil1",""],["T°huil 1","thuil1","°C"]].map(([lb,k,u])=>(
            <Field key={k} label={lb} val={vf[k]} onChange={updVF(k)} unit={u}/>
          ))}
          <div style={{fontWeight:"bold",color:C.hdr,fontSize:12,marginBottom:8,marginTop:8}}>Montée — Altitude 2</div>
          {[["Altitude 2","alti2","ft"],["Vi 2","vi2","kt"],["tr/mn 2","rpm2","tr/mn"],["P. ess 2","pess2",""],["P. huil 2","phuil2",""],["T°huil 2","thuil2","°C"]].map(([lb,k,u])=>(
            <Field key={k} label={lb} val={vf[k]} onChange={updVF(k)} unit={u}/>
          ))}
        </div>
        <div>
          <div style={{fontWeight:"bold",color:C.hdr,fontSize:12,marginBottom:8}}>Palier croisière</div>
          {[["Altitude","pal_alt","ft"],["Vi","pal_vi","kt"],["tr/mn","pal_rpm","tr/mn"],["P. ess","pal_pess",""],["P. huile","pal_phuil",""],["T° huile","pal_thuil","°C"]].map(([lb,k,u])=>(
            <Field key={k} label={lb} val={vf[k]} onChange={updVF(k)} unit={u}/>
          ))}
          <div style={{fontWeight:"bold",color:C.hdr,fontSize:12,marginBottom:8,marginTop:8}}>Comportement équipements</div>
          {[["Maniabilité","maniabilite"],["Instruments de bord","instruments"],["Climatisation","climatisation"],["Réchauffe carbu","rech_carbu"],["Essai réservoirs","essai_resa"],["Comportement hélice","comportement_helice"]].map(([lb,k])=>(
            <Field key={k} label={lb} val={vf[k]} onChange={updVF(k)} w={160}/>
          ))}
        </div>
        <div>
          <div style={{fontWeight:"bold",color:C.hdr,fontSize:12,marginBottom:8}}>Décrochage gaz réduits</div>
          {[["Avion lisse — Vi","decroch_lisse_vi","kt"],["Avion lisse — Obs.","decroch_lisse_obs",""],["Décollage — Vi","decroch_decol_vi","kt"],["Décollage — Obs.","decroch_decol_obs",""],["Atterrissage — Vi","decroch_atterr_vi","kt"],["Atterrissage — Obs.","decroch_atterr_obs",""]].map(([lb,k,u])=>(
            <Field key={k} label={lb} val={vf[k]} onChange={updVF(k)} unit={u} w={170}/>
          ))}
          <Field label="Avertisseur décrochage" val={vf.avertisseur_decrochage} onChange={updVF("avertisseur_decrochage")} w={170}/>
          <div style={{fontWeight:"bold",color:C.hdr,fontSize:12,marginBottom:8,marginTop:8}}>Descente / Piqué VNE</div>
          <Field label="Piqué à VNE" val={vf.pique_vne} onChange={updVF("pique_vne")} w={170}/>
          <Field label="Train sortie normale" val={vf.train_normale} onChange={updVF("train_normale")} w={170}/>
          <Field label="Train sortie secours" val={vf.train_secours} onChange={updVF("train_secours")} w={170}/>
          <Field label="Correcteur altitude" val={vf.correct_alti} onChange={updVF("correct_alti")} w={170}/>
          <Field label="Étouffoir" val={vf.etouffoir} onChange={updVF("etouffoir")} w={170}/>
          <div style={{fontWeight:"bold",color:C.hdr,fontSize:12,marginBottom:8,marginTop:8}}>Au sol</div>
          <Field label="Roulage" val={vf.roulage} onChange={updVF("roulage")} w={170}/>
          <Field label="Virages" val={vf.virages} onChange={updVF("virages")} w={170}/>
          <Field label="Freins" val={vf.freins_sol} onChange={updVF("freins_sol")} w={170}/>
        </div>
        <div style={{width:"100%"}}>
          <div style={{fontWeight:"bold",color:C.hdr,fontSize:12,marginBottom:6}}>Remarques pilote</div>
          <textarea value={vf.remarques} onChange={e=>updVF("remarques")(e.target.value)} rows={3} placeholder="Remarques et observations du pilote..."
            style={{width:"100%",fontSize:13,padding:8,border:`1px solid ${C.brd}`,borderRadius:4,resize:"vertical",boxSizing:"border-box"}}/>
        </div>
      </div>
    </div>}

    {/* TAB: TRANSPONDEUR */}
    {tab==="transp" && <div style={{marginTop:10,border:`1px solid ${C.brd}`,borderRadius:6,background:"#fff"}}>
      <div style={{background:C.hdr,color:"#fff",padding:"8px 14px",fontWeight:"bold",fontSize:13}}>ANNEXE 1 — TEST INTERMÉDIAIRE CHAÎNE ATC (DSAC P-41-14)</div>
      <div style={{padding:16}}>
        <div style={{fontSize:12,color:"#555",marginBottom:14,lineHeight:1.7,background:"#f0f2f8",padding:10,borderRadius:6,border:`1px solid ${C.brd}`}}>
          Tests effectués en vol — altimètre calé à <strong>1013 hPa</strong>. Comparaison avec les altitudes indiquées par le transpondeur aux 4 niveaux de référence.
        </div>
        <table style={{width:"100%",maxWidth:500,borderCollapse:"collapse",fontSize:13,marginBottom:16}}>
          <thead><tr style={{background:"#edf0f8"}}>
            <th style={{padding:"8px 12px",textAlign:"left",borderBottom:`1px solid ${C.brd}`}}>Altitude à relever</th>
            <th style={{padding:"8px 12px",textAlign:"left",borderBottom:`1px solid ${C.brd}`}}>Altitude constatée</th>
          </tr></thead>
          <tbody>
            {[["1200 ft","transp_1200"],["3700 ft","transp_3700"],["5500 ft","transp_5500"],["7500 ft","transp_7500"]].map(([alt,k])=>(
              <tr key={k} style={{borderBottom:`1px solid ${C.brd}`}}>
                <td style={{padding:"8px 12px",fontWeight:"bold",color:C.hdr}}>{alt}</td>
                <td style={{padding:"6px 12px"}}>
                  <input value={vf[k]} onChange={e=>updVF(k)(e.target.value)} placeholder="ft" style={{width:100,padding:"4px 8px",border:`1px solid ${C.brd}`,borderRadius:3,fontSize:13}}/>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
        <div style={{display:"flex",gap:20,flexWrap:"wrap"}}>
          <div>
            <div style={{fontWeight:"bold",color:C.hdr,fontSize:12,marginBottom:6}}>Pilote</div>
            <input value={vf.transp_pilote} onChange={e=>updVF("transp_pilote")(e.target.value)} placeholder="Nom du pilote" style={{width:200,padding:"5px 8px",border:`1px solid ${C.brd}`,borderRadius:3,fontSize:13}}/>
          </div>
          <div>
            <div style={{fontWeight:"bold",color:C.hdr,fontSize:12,marginBottom:6}}>APRSeur</div>
            <input value={vf.transp_aprs} onChange={e=>updVF("transp_aprs")(e.target.value)} placeholder="Nom de l'APRSeur" style={{width:200,padding:"5px 8px",border:`1px solid ${C.brd}`,borderRadius:3,fontSize:13}}/>
          </div>
        </div>
        <div style={{marginTop:14,background:"#f4f6fb",border:`1px solid ${C.brd}`,borderRadius:6,padding:12,fontSize:13,fontStyle:"italic",color:"#333",lineHeight:1.9}}>
          Tests intermédiaires de la chaîne ATC effectués en vol : <strong>APRS</strong><br/>
          A Chavenay le <strong>{new Date(visitDate).toLocaleDateString("fr-FR")}</strong><br/>
          Signature de l'APRSeur : <strong>{vf.transp_aprs||"_______________"}</strong>
        </div>
      </div>
    </div>}

    {/* Travaux / pièces / signature */}
    <div style={{marginTop:10,border:`1px solid ${C.brd}`,borderRadius:6,background:"#fff"}}>
      <div style={{background:C.acc,color:"#fff",padding:"7px 13px",fontWeight:"bold",fontSize:13}}>TRAVAUX SUPPLÉMENTAIRES & PIÈCES REMPLACÉES</div>
      <div style={{padding:14,display:"flex",flexDirection:"column",gap:10}}>
        {[["Travaux supplémentaires","worksExtra","Décrire les travaux..."],["Pièces remplacées","partsReplaced","Énumérer les pièces..."]].map(([lbl,key,ph])=>(
          <div key={key}>
            <div style={{fontWeight:"bold",fontSize:12,color:C.hdr,marginBottom:4}}>{lbl} :</div>
            <textarea value={st[key]} onChange={e=>upd(key)(e.target.value)} rows={2} placeholder={ph}
              style={{width:"100%",fontSize:13,padding:7,border:`1px solid ${C.brd}`,borderRadius:4,resize:"vertical",boxSizing:"border-box"}}/>
          </div>
        ))}
      </div>
    </div>

    {/* Déclaration APRS + signature */}
    <div style={{marginTop:10,border:`1px solid ${C.brd}`,borderRadius:6,background:"#fff",padding:16,marginBottom:14}}>
      <div style={{fontWeight:"bold",color:C.hdr,marginBottom:8,fontSize:13}}>DÉCLARATION D'ENTRETIEN — APRS</div>
      <div style={{background:C.lgt,border:`1px solid ${C.brd}`,borderRadius:6,padding:12,marginBottom:14,fontSize:13,fontStyle:"italic",lineHeight:1.9,color:"#333"}}>
        Je soussigné(e) <strong>{techName||"_______________"}</strong>, N° licence <strong>{licenceNum||"_________"}</strong>, certifie que l'aéronef <strong>{immat}</strong> a été entretenu conformément au programme d'entretien CNRA Éd.{INFO.edition} du {INFO.date} et satisfait aux conditions normales d'utilisation prévues par le manuel de vol. Fait à Chavenay le <strong>{new Date(visitDate).toLocaleDateString("fr-FR")}</strong>.
      </div>
      <div style={{fontWeight:"bold",color:C.hdr,marginBottom:10}}>Signature</div>
      <div style={{display:"flex",gap:24,flexWrap:"wrap",alignItems:"flex-start"}}>
        <div style={{fontSize:13,lineHeight:2,minWidth:200}}>
          <div><strong>Technicien :</strong> {techName||"—"}</div>
          <div><strong>N° Licence :</strong> {licenceNum||"—"}</div>
          <div><strong>Date :</strong> {new Date(visitDate).toLocaleDateString("fr-FR")}</div>
          <div><strong>Visite :</strong> {visitType}</div>
          <div><strong>Immatriculation :</strong> {immat}</div>
        </div>
        <div><div style={{fontSize:12,marginBottom:5,color:"#555"}}>Signature manuscrite :</div><SigPad onSave={setSig} existing={sig}/></div>
      </div>
    </div>

    {/* Boutons */}
    <div style={{display:"flex",gap:10,justifyContent:"flex-end",flexWrap:"wrap"}}>
      <button onClick={clear} style={{background:"#eee",color:"#555",border:"1px solid #ccc",borderRadius:4,padding:"7px 16px",cursor:"pointer",fontSize:14}}>Réinitialiser</button>
      <button onClick={dlPDF} disabled={pdfBusy}
        style={{background:pdfBusy?"#666":C.hdr,color:"#fff",border:"none",borderRadius:4,padding:"7px 22px",cursor:pdfBusy?"wait":"pointer",fontWeight:"bold",fontSize:14}}>
        {pdfBusy?"⏳ Génération...":"📄 Télécharger PDF"}
      </button>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
