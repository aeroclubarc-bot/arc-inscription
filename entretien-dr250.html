    const SIG_W=380,SIG_H=110;
    const C={bg:"#f4f6fb",hdr:"#1a1a6e",acc:"#2255aa",lgt:"#e8edf8",brd:"#c5cce0",grn:"#1e7a1e",r0:"#fff",r1:"#f7f8fd"};
    const defState=()=>({visitType:"100h",immat:"",visitDate:new Date().toISOString().slice(0,10),techName:"",totalH:"",checked:{},remarks:{},worksExtra:"",partsReplaced:""});

    function SigPad({onSave,existing}){
      const ref=useRef(null);const[drawing,setDrawing]=useState(false);const[has,setHas]=useState(!!existing);
      useEffect(()=>{if(existing&&ref.current){const img=new Image();img.onload=()=>ref.current.getContext("2d").drawImage(img,0,0);img.src=existing;}},[]);
      const pos=e=>{const r=ref.current.getBoundingClientRect();return e.touches?{x:e.touches[0].clientX-r.left,y:e.touches[0].clientY-r.top}:{x:e.clientX-r.left,y:e.clientY-r.top};};
      const dn=e=>{e.preventDefault();setDrawing(true);const p=pos(e),ctx=ref.current.getContext("2d");ctx.beginPath();ctx.moveTo(p.x,p.y);};
      const mv=e=>{e.preventDefault();if(!drawing)return;const p=pos(e),ctx=ref.current.getContext("2d");ctx.lineWidth=2;ctx.lineCap="round";ctx.strokeStyle="#1a1a6e";ctx.lineTo(p.x,p.y);ctx.stroke();setHas(true);};
      const up=()=>{setDrawing(false);if(ref.current)onSave(ref.current.toDataURL());};
      const clr=()=>{ref.current.getContext("2d").clearRect(0,0,SIG_W,SIG_H);setHas(false);onSave(null);};
      return <div style={{display:"flex",flexDirection:"column",gap:6}}>
        <canvas ref={ref} width={SIG_W} height={SIG_H} style={{border:"1.5px solid #aab",borderRadius:4,background:"#f9f9ff",cursor:"crosshair",touchAction:"none"}}
          onMouseDown={dn} onMouseMove={mv} onMouseUp={up} onMouseLeave={up} onTouchStart={dn} onTouchMove={mv} onTouchEnd={up}/>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <button onClick={clr} style={{fontSize:11,padding:"2px 10px",background:"#eee",border:"1px solid #ccc",borderRadius:3,cursor:"pointer"}}>Effacer</button>
          {has&&<span style={{fontSize:11,color:"#2a7a2a"}}>✓ Enregistrée</span>}
        </div>
      </div>;
    }

    function XCell({active,done,onToggle}){
      if(!active)return <td style={{textAlign:"center",borderBottom:"1px solid #eee",color:"#ddd"}}>—</td>;
      return <td onClick={onToggle} style={{textAlign:"center",borderBottom:"1px solid #eee",cursor:"pointer",userSelect:"none",fontSize:15,fontWeight:"bold",color:done?"#1e7a1e":"#2255aa",opacity:done?1:0.4}}>{done?"✓":"×"}</td>;
    }

    function buildPDF(state,signature){
      const{visitType,immat,visitDate,techName,totalH,checked,remarks,worksExtra,partsReplaced}=state;
      const doc=new window.jspdf.jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
      const PW=210,PH=297,ML=12,MR=12,MT=12,CW=186;let y=MT;
      const fmtD=d=>{if(!d)return"—";const[yr,m,dy]=d.split("-");return`${dy}/${m}/${yr}`;};
      const vKey=visitType==="50h"?"v50":"v100";
      const chk=(n=6)=>{if(y+n>PH-14){doc.addPage();y=MT;}};
      const split=(t,w,s=8)=>{doc.setFontSize(s);return doc.splitTextToSize(t,w);};
      doc.setFillColor(26,26,110);doc.rect(ML,y,CW,13,"F");
      doc.setTextColor(255,255,255);doc.setFontSize(12);doc.setFont("helvetica","bold");
      doc.text("MANUEL D'ENTRETIEN — JODEL DR 250",ML+3,y+5.5);
      doc.setFontSize(7.5);doc.setFont("helvetica","normal");
      doc.text("Avions Pierre Robin — Conforme arrêté 10 Nov. 1967 — Centre Est Aéronautique, Dijon",ML+3,y+10.5);
      doc.setTextColor(0,0,0);y+=15;
      doc.setFillColor(232,237,248);doc.rect(ML,y,CW,18,"F");
      doc.setDrawColor(197,204,224);doc.rect(ML,y,CW,18);
      [["Immatriculation",immat||"—"],["Type de visite",visitType],["Date",fmtD(visitDate)],["Technicien",techName||"—"],["Potentiel total",totalH?totalH+" h":"—"]].forEach(([k,v],i)=>{
        const cx=i<3?ML+3:ML+3+CW/2,cy=i<3?y+4+i*4.5:y+4+(i-3)*4.5;
        doc.setFont("helvetica","bold");doc.setFontSize(7.5);doc.setTextColor(26,26,110);doc.text(k+":",cx,cy);
        doc.setFont("helvetica","normal");doc.setTextColor(0,0,0);doc.text(v,cx+30,cy);
      });
      y+=21;
      const xEl=ML,xIn=ML+38,x50=ML+132,x100=ML+142,xNt=ML+154;
      for(const sec of SECTIONS){
        chk(10);doc.setFillColor(34,85,170);doc.rect(ML,y,CW,6,"F");
        doc.setTextColor(255,255,255);doc.setFontSize(8.5);doc.setFont("helvetica","bold");
        doc.text(sec.title,ML+2,y+4.2);doc.setTextColor(0,0,0);y+=7;
        if(sec.type==="checklist"){
          for(let i=0;i<sec.items.length;i++){
            const key=`${sec.id}_${i}`,ok=!!checked[key],txt=sec.items[i];
            const lines=split(txt,CW-14,7.5),rh=Math.max(5,lines.length*3.8+2);
            chk(rh+1);
            doc.setFillColor(i%2?247:255,i%2?248:255,i%2?253:255);doc.rect(ML,y,CW,rh,"F");
            doc.setDrawColor(220,225,240);doc.line(ML,y+rh,ML+CW,y+rh);
            doc.setDrawColor(ok?"#1e7a1e":34,ok?122:85,ok?30:170);doc.setLineWidth(0.4);doc.rect(ML+2,y+rh/2-2.2,4,4);
            if(ok){doc.setDrawColor(30,122,30);doc.setLineWidth(0.6);doc.line(ML+2.5,y+rh/2,ML+3.8,y+rh/2+1.5);doc.line(ML+3.8,y+rh/2+1.5,ML+5.8,y+rh/2-1.5);}

            doc.setFontSize(7);doc.setFont("helvetica","bold");doc.setTextColor(appl?26:160,appl?26:160,appl?110:160);
            elL.forEach((l,li)=>doc.text(l,xEl+1,y+3.6+li*3.6));
            doc.setFont("helvetica","normal");doc.setTextColor(appl?40:160,appl?40:160,appl?40:160);
            inL.forEach((l,li)=>doc.text(l,xIn+1,y+3.6+li*3.6));
            if(item.v50){doc.setFontSize(8);doc.setFont("helvetica","bold");doc.setTextColor(d50?30:34,d50?122:85,d50?30:170);doc.text(d50?"✓":"x",x50+2,y+rh/2+1.5);}
            if(item.v100){doc.setFontSize(8);doc.setFont("helvetica","bold");doc.setTextColor(d100?30:34,d100?122:85,d100?30:170);doc.text(d100?"✓":"x",x100+2,y+rh/2+1.5);}
            if(ntL.length){doc.setFontSize(6.5);doc.setFont("helvetica","italic");doc.setTextColor(150,100,0);ntL.forEach((l,li)=>doc.text(l,xNt+1,y+3.2+li*3));}
            doc.setTextColor(0,0,0);y+=rh;
          }
        }
        y+=3;
      }
      chk(20);doc.setFillColor(26,26,110);doc.rect(ML,y,CW,6,"F");
      doc.setTextColor(255,255,255);doc.setFontSize(8.5);doc.setFont("helvetica","bold");
      doc.text("RÉCAPITULATIF",ML+2,y+4.2);doc.setTextColor(0,0,0);y+=8;
      const nc=[];
      SECTIONS.forEach(s=>{
        if(s.type==="checklist")s.items.forEach((it,i)=>{if(!checked[`${s.id}_${i}`])nc.push({s:s.title,n:it});});
        else s.items.forEach((it,i)=>{const c=checked[`${s.id}_${i}`]||{};if((!it.v50||c.v50)&&(!it.v100||c.v100))return;nc.push({s:s.title,n:it.el});});
      });
      if(nc.length===0){
        doc.setFillColor(239,255,239);doc.rect(ML,y,CW,7,"F");
        doc.setFont("helvetica","bold");doc.setFontSize(8);doc.setTextColor(30,122,30);
        doc.text("Toutes les verifications applicables ont ete effectuees.",ML+3,y+4.5);
        doc.setTextColor(0,0,0);y+=9;
      }else{
        doc.setFillColor(255,248,240);doc.rect(ML,y,CW,6,"F");
        doc.setFont("helvetica","bold");doc.setFontSize(8);doc.setTextColor(181,84,40);
        doc.text("Elements non completes : "+nc.length,ML+3,y+4.2);doc.setTextColor(0,0,0);y+=7;
        nc.forEach(n=>{chk(5);doc.setFont("helvetica","normal");doc.setFontSize(7);const ls=split("- "+n.n+" ("+n.s+")",CW-4,7);ls.forEach((l,li)=>{chk(4);doc.text(l,ML+3,y+3.5+li*3.5);});y+=Math.max(5,ls.length*3.5+1);});
        y+=2;
      }
      chk(40);doc.setFillColor(34,85,170);doc.rect(ML,y,CW,6,"F");
      doc.setTextColor(255,255,255);doc.setFontSize(8.5);doc.setFont("helvetica","bold");
      doc.text("V - FORMULES DE CLOTURE",ML+2,y+4.2);doc.setTextColor(0,0,0);y+=8;
      const tCell=`Appareil visite le ${fmtD(visitDate)} suivant programme de visite, petit entretien de ${visitType} etabli par le C.E.A. L'appareil a ete trouve en etat de vol. Travaux supplementaires : ${worksExtra||"neant"}. Pieces remplacees : ${partsReplaced||"neant"}.`;
      const tMot=`Examen et point fixe de controle effectues le ${fmtD(visitDate)} selon programme de visite de petit entretien de ${visitType} etabli par le C.E.A. Le GMP a ete trouve en bon etat de fonctionnement. Travaux supplementaires : ${worksExtra||"neant"}. Pieces remplacees : ${partsReplaced||"neant"}.`;
      [["Livret Cellule",tCell],["Livret Moteur",tMot]].forEach(([lbl,txt])=>{
        chk(20);doc.setFillColor(244,246,251);doc.rect(ML,y,CW,5,"F");
        doc.setFont("helvetica","bold");doc.setFontSize(7.5);doc.setTextColor(26,26,110);doc.text(lbl,ML+2,y+3.5);doc.setTextColor(0,0,0);y+=6;
        const ls=split(txt,CW-4,7.5);doc.setFont("helvetica","italic");doc.setFontSize(7.5);
        ls.forEach((l,li)=>{chk(4);doc.text(l,ML+2,y+3+li*3.8);});y+=ls.length*3.8+4;
      });
      chk(40);doc.setFillColor(34,85,170);doc.rect(ML,y,CW,6,"F");
      doc.setTextColor(255,255,255);doc.setFontSize(8.5);doc.setFont("helvetica","bold");
      doc.text("SIGNATURE DU TECHNICIEN",ML+2,y+4.2);doc.setTextColor(0,0,0);y+=8;
      [["Nom",techName||"—"],["Date",fmtD(visitDate)],["Visite",visitType],["Immatriculation",immat||"—"],["Potentiel",totalH?totalH+" h":"—"]].forEach(([k,v],i)=>{
        doc.setFont("helvetica","bold");doc.setFontSize(8);doc.text(k+" :",ML+2,y+i*5);
        doc.setFont("helvetica","normal");doc.text(v,ML+32,y+i*5);
      });
      const sx=ML+CW-65,sy=y-2;
      doc.setDrawColor(180,180,200);doc.rect(sx,sy,62,28);
      doc.setFontSize(6.5);doc.setTextColor(160,160,180);doc.text("Signature",sx+2,sy+3.5);
      if(signature)doc.addImage(signature,"PNG",sx+1,sy+5,60,22);
      const np=doc.getNumberOfPages();
      for(let p=1;p<=np;p++){
        doc.setPage(p);doc.setDrawColor(197,204,224);doc.line(ML,PH-10,PW-MR,PH-10);
        doc.setFontSize(6.5);doc.setFont("helvetica","normal");doc.setTextColor(130,130,150);
        doc.text(`DR 250 — ${immat||"XXXXX"} — Visite ${visitType} du ${fmtD(visitDate)}`,ML,PH-6.5);
        doc.text(`Page ${p}/${np}`,PW-MR,PH-6.5,{align:"right"});
      }
      doc.save(`DR250_${immat||"XXXXX"}_${visitType}_${visitDate}.pdf`);
    }

    function App(){
      const[st,setSt]=useState(defState);
      const[sig,setSig]=useState(null);
      const[rmkFor,setRmkFor]=useState(null);
      const[page,setPage]=useState("form");
      const[saveMsg,setSaveMsg]=useState(null);
      const[hasSave,setHasSave]=useState(false);
      const[pdfBusy,setPdfBusy]=useState(false);
      const{visitType,immat,visitDate,techName,totalH,checked,remarks,worksExtra,partsReplaced}=st;
      const upd=k=>v=>setSt(p=>({...p,[k]:typeof v==="function"?v(p[k]):v}));
      useEffect(()=>{if(window.__dr250__)setHasSave(true);},[]);
      const save=()=>{window.__dr250__={st,sig,at:new Date().toISOString()};setHasSave(true);setSaveMsg("saved");setTimeout(()=>setSaveMsg(null),2500);};
      const load=()=>{const s=window.__dr250__;if(!s)return;setSt(s.st);setSig(s.sig);setSaveMsg("loaded");setTimeout(()=>setSaveMsg(null),2500);};
      const clear=()=>{window.__dr250__=null;setHasSave(false);setSt(defState());setSig(null);setSaveMsg("cleared");setTimeout(()=>setSaveMsg(null),2500);};
      const expJ=()=>{const b=new Blob([JSON.stringify({st,at:new Date().toISOString()},null,2)],{type:"application/json"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=`DR250_${immat||"XX"}_${visitDate}.json`;a.click();URL.revokeObjectURL(u);};
      const impJ=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const p=JSON.parse(ev.target.result);if(p.st){setSt(p.st);setSaveMsg("loaded");setTimeout(()=>setSaveMsg(null),2500);}}catch{alert("Fichier invalide.");}};r.readAsText(f);e.target.value="";};
      const dlPDF=async()=>{setPdfBusy(true);try{buildPDF(st,sig);}catch(e){alert("Erreur PDF : "+e.message);}finally{setPdfBusy(false);};};
      const togCk=k=>upd("checked")(p=>({...p,[k]:!p[k]}));
      const togCx=(k,col)=>upd("checked")(p=>{const c=p[k]||{};return{...p,[k]:{...c,[col]:!c[col]}};});
      const cx=(k,col)=>!!(checked[k]&&checked[k][col]);
      const rdone=(k,it)=>{const c=checked[k]||{};return(!it.v50||c.v50)&&(!it.v100||c.v100);};
      let tot=0,dn=0;
      SECTIONS.forEach(s=>{
        if(s.type==="checklist")s.items.forEach((_,i)=>{tot++;if(checked[`${s.id}_${i}`])dn++;});
        else s.items.forEach((it,i)=>{const k=`${s.id}_${i}`;if(it.v50){tot++;if(cx(k,"v50"))dn++;}if(it.v100){tot++;if(cx(k,"v100"))dn++;}});
      });
      const pct=tot?Math.round(dn/tot*100):0;
      const fmtD=d=>{if(!d)return"—";const[y,m,day]=d.split("-");return`${day}/${m}/${y}`;};
      const savedAt=window.__dr250__?.at?new Date(window.__dr250__.at).toLocaleString("fr-FR"):null;

      const SaveBar=()=>(
        <div style={{background:"#1a1a2e",padding:"7px 14px",display:"flex",flexWrap:"wrap",gap:8,alignItems:"center"}}>

          <button onClick={save} style={{fontSize:11,padding:"3px 10px",background:"#2255aa",color:"#fff",border:"none",borderRadius:3,cursor:"pointer",fontWeight:"bold"}}>Sauvegarder</button>
          {hasSave&&<button onClick={load} style={{fontSize:11,padding:"3px 10px",background:"#2a7a2a",color:"#fff",border:"none",borderRadius:3,cursor:"pointer"}}>Reprendre</button>}
          <button onClick={expJ} style={{fontSize:11,padding:"3px 10px",background:"#444",color:"#fff",border:"none",borderRadius:3,cursor:"pointer"}}>↓ Export .json</button>
          <label style={{fontSize:11,padding:"3px 10px",background:"#444",color:"#fff",borderRadius:3,cursor:"pointer"}}>↑ Import .json<input type="file" accept=".json" onChange={impJ} style={{display:"none"}}/></label>
          {hasSave&&<button onClick={clear} style={{fontSize:11,padding:"3px 10px",background:"#933",color:"#fff",border:"none",borderRadius:3,cursor:"pointer"}}>Effacer</button>}
          {savedAt&&<span style={{fontSize:10,color:"#8ab"}}>Sauvegarde : {savedAt}</span>}
          {saveMsg&&<span style={{fontSize:11,fontWeight:"bold",color:saveMsg==="cleared"?"#f88":"#8f8"}}>{saveMsg==="saved"?"✓ Sauvegardé !":saveMsg==="loaded"?"✓ Repris !":"✓ Effacé"}</span>}
        </div>
      );

      if(page==="summary"){
        const nc=[];
        SECTIONS.forEach(s=>{
          if(s.type==="checklist")s.items.forEach((it,i)=>{const k=`${s.id}_${i}`;if(!checked[k])nc.push({s:s.title,n:it,r:remarks[k]});});
          else s.items.forEach((it,i)=>{const k=`${s.id}_${i}`;if(!rdone(k,it))nc.push({s:s.title,n:it.el,r:remarks[k]});});
        });
        return <div style={{fontFamily:"Arial,sans-serif",maxWidth:900,margin:"0 auto",padding:20,background:C.bg,minHeight:"100vh"}}>
          <div style={{background:C.hdr,color:"#fff",padding:"13px 18px",borderRadius:"8px 8px 0 0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div><div style={{fontSize:18,fontWeight:"bold"}}>MANUEL D'ENTRETIEN — DR 250</div><div style={{fontSize:12,opacity:0.85}}>Récapitulatif & Clôture</div></div>
            <button onClick={()=>setPage("form")} style={{background:"#fff",color:C.hdr,border:"none",borderRadius:4,padding:"5px 14px",cursor:"pointer",fontWeight:"bold"}}>← Retour</button>
          </div>
          <SaveBar/>
          <div style={{height:10}}/>
          <div style={{background:"#fff",borderRadius:8,padding:14,marginBottom:10,border:`1px solid ${C.brd}`}}>

              {[["Immatriculation",immat||"—"],["Type de visite",visitType],["Date",fmtD(visitDate)],["Technicien",techName||"—"],["Potentiel total",totalH||"—"]].map(([k,v])=>(
                <tr key={k}><td style={{fontWeight:"bold",padding:"3px 10px 3px 0",color:C.hdr,width:200}}>{k}</td><td>{v}</td></tr>

          {nc.length===0
            ?<div style={{background:"#efffef",border:"1px solid #5c5",borderRadius:6,padding:10,marginBottom:10,color:C.grn,fontWeight:"bold"}}>✓ Toutes les vérifications applicables ont été effectuées.</div>
            :<div style={{background:"#fff8f0",border:"1px solid #e8a",borderRadius:6,padding:12,marginBottom:10}}>
              <div style={{fontWeight:"bold",color:"#b54",marginBottom:6}}>⚠ Éléments non complétés ({nc.length})</div>

            </div>

                ["🔧 Livret Moteur",`Examen et point fixe de contrôle effectués le ${fmtD(visitDate)} selon programme de visite de petit entretien de ${visitType} établi par le C.E.A. Le GMP a été trouvé en bon état de fonctionnement. Travaux supplémentaires : ${worksExtra||"néant"}. Pièces remplacées : ${partsReplaced||"néant"}.`]
              ].map(([t,tx])=>(
                <div key={t} style={{background:"#f4f6fb",border:`1px solid ${C.brd}`,borderRadius:6,padding:12}}>
                  <div style={{fontWeight:"bold",color:C.hdr,fontSize:12,marginBottom:5}}>{t}</div>

                <div><strong>Visite :</strong> {visitType}</div><div><strong>Immatriculation :</strong> {immat||"—"}</div>

              {pdfBusy?"⏳ Génération...":"📄 Télécharger le PDF"}
            </button>
          </div>
        </div>;
      }

      return <div style={{fontFamily:"Arial,sans-serif",maxWidth:1000,margin:"0 auto",padding:20,background:C.bg,minHeight:"100vh"}}>
        <div style={{background:C.hdr,color:"#fff",padding:"13px 18px",borderRadius:"8px 8px 0 0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><div style={{fontSize:20,fontWeight:"bold",letterSpacing:2}}>MANUEL D'ENTRETIEN</div><div style={{fontSize:13,letterSpacing:1,opacity:0.9}}>JODEL DR 250 — Avions Pierre Robin</div></div>

        <div style={{background:C.lgt,border:`1px solid ${C.brd}`,borderTop:"none",padding:"10px 14px",display:"flex",flexWrap:"wrap",gap:12,alignItems:"flex-end"}}>

        {SECTIONS.map(sec=>(

                {sec.items.map((it,i)=>{

                    <input type="checkbox" checked={ok} onChange={()=>togCk(k)} style={{width:16,height:16,cursor:"pointer",accentColor:C.acc,flexShrink:0}}/>
                    <span style={{flex:1,fontSize:13,color:ok?"#888":"#222",textDecoration:ok?"line-through":"none",minWidth:200}}>{it}</span>
                    <button onClick={()=>setRmkFor(rmkFor===k?null:k)} style={{background:remarks[k]?"#ffe0a0":"#eee",border:"1px solid #ccc",borderRadius:3,cursor:"pointer",fontSize:11,padding:"2px 8px",flexShrink:0}}>{remarks[k]?"📝 Note":"+ Note"}</button>
                    {rmkFor===k&&<textarea value={remarks[k]||""} onChange={e=>upd("remarks")(p=>({...p,[k]:e.target.value}))} placeholder="Observations..." rows={1} style={{fontSize:12,padding:4,border:"1px solid #ccc",borderRadius:3,width:"100%",resize:"vertical",marginTop:4}}/>}
                  </div>;
                })}
              </div>
            ):(
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,minWidth:480}}>
                  <thead><tr style={{background:"#edf0f8",color:"#444"}}>
                    <th style={{padding:"5px 8px",textAlign:"left",width:"20%",borderBottom:`1px solid ${C.brd}`}}>Élément</th>
                    <th style={{padding:"5px 8px",textAlign:"left",borderBottom:`1px solid ${C.brd}`}}>Type d'inspection</th>
                    <th style={{padding:"5px 4px",textAlign:"center",width:44,borderBottom:`1px solid ${C.brd}`,color:C.acc}}>50h</th>
                    <th style={{padding:"5px 4px",textAlign:"center",width:44,borderBottom:`1px solid ${C.brd}`,color:C.acc}}>100h</th>
                    <th style={{padding:"5px 6px",textAlign:"center",width:58,borderBottom:`1px solid ${C.brd}`}}>Note</th>
                  </tr></thead>
                  <tbody>
                    {sec.items.map((it,i)=>{
                      const k=`${sec.id}_${i}`,d50=cx(k,"v50"),d100=cx(k,"v100"),rd=rdone(k,it);
                      return <tr key={i} style={{background:rd?"#efffef":i%2?C.r1:C.r0}}>
                        <td style={{padding:"5px 8px",fontWeight:"600",color:C.hdr,borderBottom:"1px solid #eee",verticalAlign:"top"}}>{it.el}</td>
                        <td style={{padding:"5px 8px",color:"#333",lineHeight:1.4,borderBottom:"1px solid #eee",verticalAlign:"top"}}>{it.insp}</td>
                        <XCell active={it.v50} done={d50} onToggle={()=>togCx(k,"v50")}/>
                        <XCell active={it.v100} done={d100} onToggle={()=>togCx(k,"v100")}/>
                        <td style={{textAlign:"center",borderBottom:"1px solid #eee",verticalAlign:"middle",position:"relative"}}>
                          <button onClick={()=>setRmkFor(rmkFor===k?null:k)} style={{background:remarks[k]?"#ffe0a0":"#eee",border:"1px solid #ccc",borderRadius:3,cursor:"pointer",fontSize:10,padding:"2px 6px"}}>{remarks[k]?"📝":"+"}</button>
                          {rmkFor===k&&<div style={{position:"absolute",right:0,zIndex:20,background:"#fff",border:"1px solid #aab",borderRadius:4,padding:8,boxShadow:"0 2px 10px #0003",width:210}}>
                            <textarea value={remarks[k]||""} onChange={e=>upd("remarks")(p=>({...p,[k]:e.target.value}))} placeholder="Observations..." rows={3} style={{fontSize:12,width:"100%",padding:4,border:"1px solid #ccc",borderRadius:3,resize:"vertical",boxSizing:"border-box"}}/>
                            <button onClick={()=>setRmkFor(null)} style={{marginTop:4,fontSize:11,padding:"2px 10px",cursor:"pointer",background:C.acc,color:"#fff",border:"none",borderRadius:3}}>OK</button>
                          </div>}
                        </td>
                      </tr>;
                    })}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        ))}
        <div style={{marginTop:14,display:"flex",gap:10,justifyContent:"flex-end",flexWrap:"wrap"}}>
          <button onClick={clear} style={{background:"#eee",color:"#555",border:"1px solid #ccc",borderRadius:4,padding:"7px 16px",cursor:"pointer",fontSize:14}}>Réinitialiser</button>
          <button onClick={dlPDF} disabled={pdfBusy} style={{background:pdfBusy?"#666":"#1e7a1e",color:"#fff",border:"none",borderRadius:4,padding:"7px 18px",cursor:pdfBusy?"wait":"pointer",fontWeight:"bold",fontSize:14}}>
            {pdfBusy?"⏳ Génération...":"📄 Télécharger PDF"}
          </button>
          <button onClick={()=>setPage("summary")} style={{background:C.hdr,color:"#fff",border:"none",borderRadius:4,padding:"7px 22px",cursor:"pointer",fontWeight:"bold",fontSize:14}}>Récapitulatif & Clôture →</button>
        </div>
      </div>;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
</body>
</html>
